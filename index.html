<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuzucuklar — Berrak ile Dada</title>
</head>
<body>
<style>
  :root{
    --sky-morning-a:#BDE3F5; --sky-morning-b:#EAF7E3;
    --sky-day-a:#8ECDEB;     --sky-day-b:#CDEDF7;
    --sky-sunset-a:#FF9A76;  --sky-sunset-b:#FFD3A0;
    --sky-night-a:#26315E;   --sky-night-b:#4A5590;
    --grass:#7FC383; --grass-dark:#5EA968;
    --wool:#FFF9EF; --ink:#4A3C2E; --sun:#FFD66B;
    --panel:#FFF9EF; --accent:#E8845C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; overflow:hidden;}
  body{
    font-family:"Comic Sans MS","Segoe UI Rounded","Segoe UI",sans-serif;
    color:var(--ink); background:#26315E;
    user-select:none;
  }

  #book{position:fixed; inset:0;}
  .scene{
    position:absolute; inset:0; display:flex; flex-direction:column;
    opacity:0; pointer-events:none; transition:opacity .8s ease;
  }
  .scene.active{opacity:1; pointer-events:auto;}

  .sky{position:relative; flex:1; overflow:hidden;}
  .scene[data-sky="morning"] .sky{background:linear-gradient(var(--sky-morning-a),var(--sky-morning-b));}
  .scene[data-sky="day"]     .sky{background:linear-gradient(var(--sky-day-a),var(--sky-day-b));}
  .scene[data-sky="sunset"]  .sky{background:linear-gradient(#B96A9A 0%,var(--sky-sunset-a) 45%,var(--sky-sunset-b) 100%);}
  .scene[data-sky="night"]   .sky{background:linear-gradient(#161D3E,var(--sky-night-a) 60%,var(--sky-night-b));}

  .ground{
    position:absolute; left:0; right:0; bottom:0; height:26%;
    background:linear-gradient(var(--grass),var(--grass-dark));
    border-radius:50% 50% 0 0 / 30px 30px 0 0;
  }
  .scene[data-sky="sunset"] .ground{filter:hue-rotate(-14deg) brightness(.92);}
  .scene[data-sky="night"]  .ground{filter:brightness(.45) saturate(.7);}

  /* ---------- text panel ---------- */
  .panel{
    background:var(--panel); padding:14px 18px calc(14px + env(safe-area-inset-bottom,0px));
    border-top:4px dashed #E5CFA8;
    display:flex; flex-direction:column; gap:8px; align-items:center;
    min-height:26vh; max-height:44vh; justify-content:center;
  }
  .panel p{
    margin:0; max-width:34em; text-align:center;
    font-size:clamp(15px,2.6vmin,21px); line-height:1.55;
  }
  .panel .speak{color:var(--accent); font-weight:bold;}
  .hint{font-size:clamp(11px,1.9vmin,14px); opacity:.55;}

  /* ---------- navigation ---------- */
  #nav{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px calc(8px + env(safe-area-inset-bottom,0px));
    pointer-events:none;
  }
  #nav button{
    pointer-events:auto; border:none; cursor:pointer;
    background:var(--accent); color:#fff;
    font-family:inherit; font-size:clamp(16px,3vmin,22px); font-weight:bold;
    padding:10px 22px; border-radius:999px;
    box-shadow:0 4px 0 #B85E3C; transition:transform .1s;
  }
  #nav button:active{transform:translateY(3px); box-shadow:0 1px 0 #B85E3C;}
  #nav button:focus-visible{outline:3px solid #fff; outline-offset:2px;}
  #nav button[disabled]{opacity:0; pointer-events:none;}
  #dots{display:flex; gap:7px;}
  #dots i{width:10px; height:10px; border-radius:50%; background:#fff; opacity:.45; transition:.3s;}
  #dots i.on{opacity:1; transform:scale(1.35); background:var(--sun);}

  /* ---------- sun & moon ---------- */
  .sun{
    position:absolute; width:11vmin; height:11vmin; border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#FFE9A8,var(--sun));
    box-shadow:0 0 40px 12px rgba(255,214,107,.55);
    animation:sunbreathe 5s ease-in-out infinite;
  }
  @keyframes sunbreathe{50%{transform:scale(1.06);}}
  .moon{
    position:absolute; width:9vmin; height:9vmin; border-radius:50%;
    background:radial-gradient(circle at 38% 34%,#FFFDF2,#F3E9C8);
    box-shadow:0 0 34px 10px rgba(243,233,200,.35);
  }
  .moon::after{content:""; position:absolute; width:2vmin; height:2vmin; border-radius:50%;
    background:rgba(0,0,0,.06); left:28%; top:42%;
    box-shadow:3vmin -1.6vmin 0 -.4vmin rgba(0,0,0,.05);}

  /* ---------- clouds ---------- */
  .cloud{
    position:absolute; height:6vmin; width:15vmin; border-radius:999px; background:#fff;
    opacity:.92; animation:drift linear infinite;
  }
  .cloud::before,.cloud::after{content:""; position:absolute; background:#fff; border-radius:50%;}
  .cloud::before{width:7vmin;height:7vmin; left:2vmin; top:-3.2vmin;}
  .cloud::after{width:5vmin;height:5vmin; left:7.5vmin; top:-2.2vmin;}
  @keyframes drift{from{transform:translateX(-25vw);} to{transform:translateX(115vw);}}

  /* ---------- stars ---------- */
  .star{position:absolute; width:.7vmin; height:.7vmin; background:#FFF6D8; border-radius:50%;
    animation:twinkle 2.4s ease-in-out infinite;}
  @keyframes twinkle{50%{opacity:.15; transform:scale(.6);}}

  /* ---------- barn ---------- */
  .barn{position:absolute; bottom:20%; width:26vmin; height:20vmin;}
  .barn .body{position:absolute; inset:32% 6% 0; background:#C96A4B; border-radius:6px 6px 0 0;}
  .barn .roof{position:absolute; top:0; left:0; right:0; height:42%;
    background:#8E4B33; clip-path:polygon(50% 0,100% 100%,0 100%);}
  .barn .door{position:absolute; bottom:0; left:36%; width:28%; height:44%;
    background:#7A4029; border-radius:8px 8px 0 0;}
  .barn .win{position:absolute; top:44%; width:16%; height:18%; background:#FFE9A8;
    border-radius:4px; border:3px solid #8E4B33;}
  .barn .win.l{left:10%;} .barn .win.r{right:10%;}

  /* ---------- characters (SVG kept in defs, used via <use>) ---------- */
  .actor{position:absolute; cursor:pointer; transform-origin:50% 100%;}
  .actor svg{display:block; width:100%; height:100%; overflow:visible;}
  .actor.flip svg{transform:scaleX(-1);}
  .actor .bubble{
    position:absolute; left:50%; top:-2.2em; transform:translateX(-50%) scale(0);
    background:#fff; color:var(--ink); font-weight:bold;
    font-size:clamp(13px,2.4vmin,18px);
    padding:.25em .8em; border-radius:999px; white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.18); transition:transform .25s;
    pointer-events:none;
  }
  .actor.talking .bubble{transform:translateX(-50%) scale(1);}
  .actor.jump{animation:jump .55s ease;}
  @keyframes jump{35%{transform:translateY(-4.5vmin) rotate(-4deg);} 70%{transform:translateY(0) rotate(2deg);}}
  .bob{animation:bob 2.6s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateY(-1.1vmin);}}
  .hop{animation:hop 1.6s ease-in-out infinite;}
  @keyframes hop{0%,100%{transform:translateY(0);} 30%{transform:translateY(-2.4vmin);} 55%{transform:translateY(0);}}
  .sleepy{animation:sleepy 4s ease-in-out infinite;}
  @keyframes sleepy{50%{transform:scale(1.03,0.97);}}

  .zzz{position:absolute; font-weight:bold; color:#FFF6D8; opacity:0;
    animation:zfloat 3.2s ease-in-out infinite; font-size:clamp(14px,3vmin,22px);}
  @keyframes zfloat{
    0%{opacity:0; transform:translateY(0) rotate(0);}
    25%{opacity:.9;}
    100%{opacity:0; transform:translateY(-7vmin) rotate(14deg);}
  }

  /* cloud animals (scene 6) */
  .cloudAnimal{position:absolute; cursor:pointer; opacity:.95; transition:transform .3s;}
  .cloudAnimal:active{transform:scale(1.08);}
  .cloudAnimal svg{width:100%; height:100%; overflow:visible;}

  /* lake */
  .lake{
    position:absolute; bottom:6%; left:50%; transform:translateX(-50%);
    width:70vmin; max-width:88vw; height:14vmin;
    background:radial-gradient(ellipse at 50% 30%,#BDE8F5,#6FB9DB);
    border-radius:50%; box-shadow:inset 0 4px 12px rgba(255,255,255,.5);
    overflow:hidden;
  }
  .ripple{position:absolute; border:2px solid rgba(255,255,255,.7); border-radius:50%;
    animation:ripple 2.6s ease-out infinite;}
  @keyframes ripple{from{transform:scale(.2); opacity:.9;} to{transform:scale(1.6); opacity:0;}}
  .splash{position:absolute; font-size:clamp(16px,3.4vmin,26px); pointer-events:none;
    animation:splashUp .8s ease-out forwards;}
  @keyframes splashUp{
    0%{opacity:1; transform:translateY(0) scale(.6);}
    100%{opacity:0; transform:translateY(-9vmin) scale(1.2);}
  }

  /* butterfly */
  .butterfly{position:absolute; font-size:clamp(16px,3vmin,24px); animation:flutter 9s ease-in-out infinite;}
  @keyframes flutter{
    0%,100%{transform:translate(0,0) rotate(-8deg);}
    25%{transform:translate(9vmin,-5vmin) rotate(8deg);}
    50%{transform:translate(2vmin,-9vmin) rotate(-6deg);}
    75%{transform:translate(-7vmin,-4vmin) rotate(6deg);}
  }

  /* title scene */
  .titleWrap{position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1.4vmin; text-align:center; padding:0 5vw 20vh;}
  .titleWrap h1{
    margin:0; font-size:clamp(30px,8.5vmin,66px); color:#fff; letter-spacing:.02em;
    text-shadow:0 3px 0 #E8845C, 0 7px 14px rgba(0,0,0,.18);
    animation:titlePop 1s cubic-bezier(.2,1.6,.4,1) both;
  }
  .titleWrap .sub{
    font-size:clamp(15px,3vmin,24px); color:#fff; background:rgba(232,132,92,.85);
    padding:.3em 1.2em; border-radius:999px; animation:titlePop 1s .25s cubic-bezier(.2,1.6,.4,1) both;
  }
  .titleWrap .dedic{font-size:clamp(12px,2.2vmin,17px); color:#5C4A36; opacity:.85;
    animation:titlePop 1s .5s both;}
  @keyframes titlePop{from{opacity:0; transform:scale(.4) translateY(4vmin);}}

  #startBtn{
    margin-top:2vmin; border:none; cursor:pointer; font-family:inherit; font-weight:bold;
    font-size:clamp(18px,3.6vmin,28px); color:#fff; background:var(--accent);
    padding:.55em 1.6em; border-radius:999px; box-shadow:0 5px 0 #B85E3C;
    animation:titlePop 1s .7s both, wiggle 2.4s 1.8s ease-in-out infinite;
  }
  #startBtn:active{transform:translateY(4px); box-shadow:0 1px 0 #B85E3C;}
  @keyframes wiggle{0%,100%{rotate:0deg;} 8%{rotate:-3deg;} 16%{rotate:3deg;} 24%{rotate:0deg;}}

  .theEnd{
    position:absolute; left:50%; top:32%; transform:translateX(-50%);
    font-size:clamp(26px,7vmin,54px); color:#FFF6D8; font-weight:bold;
    text-shadow:0 3px 10px rgba(0,0,0,.4); animation:titlePop 1.2s .4s both;
    white-space:nowrap;
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01s !important; animation-iteration-count:1 !important; transition-duration:.01s !important;}
  }
</style>

<div id="nav">

<script>
"use strict";
/* ---------- tiny sound engine (soft, kid-friendly) ---------- */
let actx=null;
function tone(freq,dur,type,vol,slideTo){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==="suspended")actx.resume();
    const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime;
    o.type=type||"sine"; o.frequency.setValueAtTime(freq,t);
    if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||.12,t+.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(actx.destination); o.start(t); o.stop(t+dur+.05);
  }catch(e){}
}
const sndMee =()=>{tone(430,.28,"triangle",.14,300); setTimeout(()=>tone(380,.22,"triangle",.1,280),120);};
const sndCik =()=>{tone(1200,.09,"sine",.1,1500); setTimeout(()=>tone(1300,.09,"sine",.09,1600),110);};
const sndPage=()=>{tone(520,.12,"sine",.06,700);};
const sndPop =()=>{tone(300,.15,"sine",.1,600);};
const sndSplash=()=>{tone(900,.25,"sine",.08,200);};

/* ---------- characters ---------- */
const CHAR={
  berrak:{sym:"sheep", wool:"#FFF9EF", face:"#9C8270", say:"Mee! Ben Berrak! 🌼"},
  dada:  {sym:"sheep", wool:"#FDF3E0", face:"#8A6F5C", say:"Mee mee! Ben Dada! ⭐"},
  ay:    {sym:"sheep", wool:"#F6EFE4", face:"#7C6553", say:"Kuzularım benim... 💛"},
  beyaz: {sym:"sheep", wool:"#FFFFFF", face:"#A08876", say:"Merhaba canlarım! 🌸"},
  baris: {sym:"ram",   wool:"#EFE6D4", face:"#6E584A", say:"Hadi oynayalım! 💪"},
  baba:  {sym:"ram",   wool:"#E4D9C4", face:"#5E4A3C", say:"Hoş geldiniz yavrularım!"},
  chick: {sym:"chick", say:"Cik cik cik! 🐤"}
};
function actor(name,cls,style,anim){
  const c=CHAR[name];
  return `<div class="actor ${anim||""} ${cls||""}" data-say="${c.say}" data-kind="${c.sym}"
    style="${style};--woolC:${c.wool||"#fff"};--faceC:${c.face||"#888"}" role="button" tabindex="0" aria-label="${name}">
    <svg viewBox="0 0 100 100"><use href="#${c.sym}"/></svg>
    <span class="bubble"></span>
  </div>`;
}
function clouds(n,skyH){
  let s="";
  for(let i=0;i<n;i++){
    const top=5+Math.random()*(skyH||30), dur=40+Math.random()*40, delay=-Math.random()*dur, sc=.6+Math.random()*.8;
    s+=`<div class="cloud" style="top:${top}%;animation-duration:${dur}s;animation-delay:${delay}s;transform:scale(${sc})"></div>`;
  }
  return s;
}
function stars(n){
  let s="";
  for(let i=0;i<n;i++)
    s+=`<div class="star" style="left:${Math.random()*100}%;top:${Math.random()*60}%;animation-delay:${(Math.random()*2.4).toFixed(2)}s"></div>`;
  return s;
}

  ${clouds(3,25)}
  <div class="barn" style="left:6%"><div class="roof"></div><div class="body"></div><div class="win l"></div><div class="win r"></div><div class="door"></div></div>
  ${actor("ay","","left:38%; bottom:21%; width:19vmin; height:19vmin","bob")}
  ${actor("berrak","flip","left:58%; bottom:20%; width:13vmin; height:13vmin","bob")}
  ${actor("dada","flip","left:72%; bottom:20%; width:12vmin; height:12vmin","hop")}
  <div class="butterfly" style="left:30%; top:30%">🦋</div>

  text:`Güneş, çiftliğin üzerine tatlı bir sıcaklık bırakırken, küçük kuzular <b>Berrak</b> ve <b>Dada</b> heyecanla uyandılar. <span class="speak">"Hadi dışarı çıkalım!"</span> diye zıpladı Dada. Anneleri <b>Ay</b> gülümsedi: <span class="speak">"Önce kahvaltı! Sütlerinizi için bakalım."</span> 🥛`},

{ sky:"morning", html:`
  <div class="sun" style="top:7%; left:6%"></div>
  ${clouds(3,25)}
  ${actor("beyaz","","left:12%; bottom:21%; width:18vmin; height:18vmin","bob")}

{ sky:"day", html:`
  <div class="sun" style="top:6%; right:8%"></div>
  ${clouds(4,28)}
  ${actor("baris","","left:8%; bottom:21%; width:21vmin; height:21vmin","bob")}
  ${actor("chick","flip","left:46%; bottom:19%; width:8vmin; height:8vmin","hop")}
  ${actor("chick","flip","left:55%; bottom:19%; width:7vmin; height:7vmin","hop")}
  ${actor("chick","flip","left:63%; bottom:19%; width:7.5vmin; height:7.5vmin","hop")}

/* ---------- build book ---------- */
const book=document.getElementById("book"), dots=document.getElementById("dots");
pages.forEach((p,i)=>{
  const s=document.createElement("section");
  s.className="scene"; s.dataset.sky=p.sky;
  s.innerHTML=`<div class="sky">${p.html}</div>
    <div class="panel">
      <p>${p.text}</p>
      ${p.restart?'<button id="restartBtn" style="border:none;cursor:pointer;font-family:inherit;font-weight:bold;font-size:clamp(15px,2.8vmin,20px);color:#fff;background:var(--accent);padding:.5em 1.4em;border-radius:999px;box-shadow:0 4px 0 #B85E3C">🔄 Baştan Oku</button>':""}
    </div>`;
  book.appendChild(s);
  const d=document.createElement("i"); dots.appendChild(d);
});

let cur=0;
const scenes=[...document.querySelectorAll(".scene")];
const prevBtn=document.getElementById("prevBtn"), nextBtn=document.getElementById("nextBtn");
function show(i){
  cur=Math.max(0,Math.min(pages.length-1,i));
  scenes.forEach((s,j)=>s.classList.toggle("active",j===cur));
  [...dots.children].forEach((d,j)=>d.classList.toggle("on",j===cur));
  prevBtn.disabled=cur===0;
  nextBtn.disabled=cur===pages.length-1;
  sndPage();
}
prevBtn.onclick=()=>show(cur-1);
nextBtn.onclick=()=>show(cur+1);
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")show(cur+1);
  if(e.key==="ArrowLeft")show(cur-1);
});

/* ---------- interactions ---------- */
function poke(a){
  a.querySelector(".bubble").textContent=a.dataset.say;
  a.classList.remove("jump"); void a.offsetWidth;
  a.classList.add("jump","talking");
  (a.dataset.kind==="chick"?sndCik:sndMee)();
  clearTimeout(a._t);
  a._t=setTimeout(()=>a.classList.remove("talking"),1600);
}
document.addEventListener("click",e=>{
  const a=e.target.closest(".actor"); if(a){poke(a); return;}
  const ca=e.target.closest(".cloudAnimal");
  if(ca){
    sndPop();
    const msg=ca.id==="cloudR"?"Tavşan! 🐰":"Koyun! 🐑";
    let b=ca.querySelector(".bubble");
    if(!b){b=document.createElement("span"); b.className="bubble"; ca.appendChild(b);}
    b.textContent=msg; ca.classList.add("talking");
    ca.classList.remove("jump"); void ca.offsetWidth;
    setTimeout(()=>ca.classList.remove("talking"),1600);
    ca.classList.add("actor");
    return;
  }
  const lake=e.target.closest("#lake");
  if(lake){
    sndSplash();
    const r=lake.getBoundingClientRect();
    const sp=document.createElement("div");
    sp.className="splash"; sp.textContent="💦";
    sp.style.left=((e.clientX-r.left)/r.width*100)+"%";
    sp.style.top=((e.clientY-r.top)/r.height*100)+"%";
    lake.appendChild(sp);
    setTimeout(()=>sp.remove(),900);
    return;
  }
  if(e.target.id==="startBtn"){show(1); return;}
  if(e.target.id==="restartBtn"){show(0); return;}
});
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"||e.key===" "){
    const a=document.activeElement;
    if(a&&a.classList&&a.classList.contains("actor")){e.preventDefault(); poke(a);}
  }
});

show(0);
</script>
