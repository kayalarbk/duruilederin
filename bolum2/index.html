<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2. Bölüm: Kuzucuklar — Berrak ile Dada</title>
<link rel="stylesheet" href="../assets/css/storybook.css">
</head>
<body>

<!-- =============== SVG karakter kütüphanesi (kuzular) =============== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>

    <g id="sheep">

      <rect x="58" y="78" width="8" height="20" rx="4" fill="#6B5442"/>
      <g fill="var(--woolC,#FFF9EF)" stroke="#E8DCC6" stroke-width="2">
        <circle cx="50" cy="62" r="26"/>

        <circle cx="72" cy="58" r="13"/>
        <circle cx="38" cy="44" r="13"/>
        <circle cx="62" cy="44" r="13"/>
        <circle cx="50" cy="40" r="13"/>
      </g>
      <circle cx="18" cy="64" r="7" fill="var(--woolC,#FFF9EF)" stroke="#E8DCC6" stroke-width="2"/>

    <g id="chick">
      <ellipse cx="50" cy="66" rx="22" ry="20" fill="#FFDE6B"/>

<a id="homeLink" class="btn" href="../index.html">📚 Kitaplık</a>
<div id="book" aria-live="polite"></div>

<div id="nav">
  <button id="prevBtn" aria-label="Önceki sayfa">◀ Geri</button>
  <div id="dots" aria-hidden="true"></div>
  <button id="nextBtn" aria-label="Sonraki sayfa">İleri ▶</button>
</div>

<script src="../assets/js/storybook.js"></script>
<script>
"use strict";
const {actor, clouds, stars, flowers, birds, bees, fish} = Storybook;

Storybook.chars({
  berrak:{sym:"sheep", wool:"#FFF9EF", face:"#9C8270", say:"Mee! Ben Berrak! 🌼"},
  dada:  {sym:"sheep", wool:"#FDF3E0", face:"#8A6F5C", say:"Mee mee! Ben Dada! ⭐"},
  ay:    {sym:"sheep", wool:"#F6EFE4", face:"#7C6553", say:"Kuzularım benim... 💛"},
  beyaz: {sym:"sheep", wool:"#FFFFFF", face:"#A08876", say:"Merhaba canlarım! 🌸"},
  baris: {sym:"ram",   wool:"#EFE6D4", face:"#6E584A", say:"Hadi oynayalım! 💪"},
  baba:  {sym:"ram",   wool:"#E4D9C4", face:"#5E4A3C", say:"Hoş geldiniz yavrularım!"},
  chick: {sym:"chick", say:"Cik cik cik! 🐤"}
});

const pages=[
{ sky:"morning", html:`
  <div class="sun" style="top:8%; left:8%"></div>
  ${clouds(3,25)}
  <div class="titleWrap">
    <h1>Kuzucuklar 🐑</h1>
    <div class="sub">2. Bölüm — Berrak ile Dada'nın Bir Günü</div>
    <div class="dedic">Duru ve Derin için, sevgiyle… 💕</div>
    <button class="startBtn" data-act="start">Masalı Başlat ✨</button>
  </div>
  ${birds(2)}
  ${actor("berrak","","left:14%; bottom:21%; width:16vmin; height:16vmin","hop")}
  ${actor("dada","flip","right:14%; bottom:21%; width:15vmin; height:15vmin","hop")}
  ${flowers(5)}
  <div class="ground"></div>`,
  text:`Kuzulara, çiçeklere, kuşlara dokun — hepsinin sesi var! 🐑🌼🐦`},

{ sky:"morning", html:`
  <div class="sun" style="top:7%; left:6%"></div>
  ${clouds(3,25)}
  <div class="barn" style="left:6%"><div class="roof"></div><div class="body"></div><div class="win l"></div><div class="win r"></div><div class="door"></div></div>

  ${actor("dada","flip","left:72%; bottom:20%; width:12vmin; height:12vmin","hop")}
  <div class="butterfly" style="left:30%; top:30%">🦋</div>
  ${birds(2)}
  ${flowers(4)}
  ${bees(1,60,32)}
  <div class="ground"></div>`,
  text:`Güneş, çiftliğin üzerine tatlı bir sıcaklık bırakırken, küçük kuzular <b>Berrak</b> ve <b>Dada</b> heyecanla uyandılar. <span class="speak">"Hadi dışarı çıkalım!"</span> diye zıpladı Dada. Anneleri <b>Ay</b> gülümsedi: <span class="speak">"Önce kahvaltı! Sütlerinizi için bakalım."</span> 🥛`},

{ sky:"morning", html:`
  <div class="sun" style="top:7%; left:6%"></div>
  ${clouds(3,25)}
  ${actor("beyaz","","left:12%; bottom:21%; width:18vmin; height:18vmin","bob")}
  ${actor("dada","flip","left:44%; bottom:20%; width:12vmin; height:12vmin","hop")}
  ${actor("berrak","flip","left:60%; bottom:20%; width:13vmin; height:13vmin","bob")}
  <div class="butterfly" style="left:70%; top:26%">🦋</div>
  ${birds(2)}
  ${flowers(4)}
  <div class="ground"></div>`,
  text:`Sürünün en güzel koyunu <b>Beyaz teyze</b> geldi. <span class="speak">"Bugün ne yapıyorsunuz bakalım?"</span> Dada hemen atıldı: <span class="speak">"Saklambaç oynayalım!"</span> Beyaz teyze güldü: <span class="speak">"Ama dikkatli ol Dada, geçen sefer kümese dalıp mahsur kalmıştın!"</span> 🙈`},

{ sky:"day", html:`
  <div class="sun" style="top:6%; right:8%"></div>

  ${actor("baris","","left:8%; bottom:21%; width:21vmin; height:21vmin","bob")}

  ${actor("chick","flip","left:55%; bottom:19%; width:7vmin; height:7vmin","hop")}
  ${actor("chick","flip","left:63%; bottom:19%; width:7.5vmin; height:7.5vmin","hop")}
  ${actor("dada","flip","left:76%; bottom:20%; width:12vmin; height:12vmin","bob")}
  ${birds(2)}
  ${flowers(3)}
  <div class="ground"></div>`,
  text:`Derken güçlü ve bilge koç <b>Barış abi</b> geldi! <span class="speak">"Bugün oyun oynayalım mı?"</span> Dada civcivlerle yarışmak istedi. Barış abi onun başını okşadı: <span class="speak">"Civcivler küçüktür, onlarla nazik olmalısın. Sonra sizi saklı göle götüreceğim!"</span> 🐤 <i>(Civcivlere dokun bakalım ne diyorlar!)</i>`},

{ sky:"day", html:`
  <div class="sun" style="top:6%; right:8%"></div>

  ${actor("dada","flip","left:10%; bottom:19%; width:12vmin; height:12vmin","hop")}

  ${actor("baris","flip","left:70%; bottom:21%; width:20vmin; height:20vmin","hop")}
  <div style="position:absolute; left:6%; bottom:18%; font-size:8vmin" aria-hidden="true">🌾</div>
  <div class="butterfly" style="left:44%; top:24%">🦋</div>
  ${birds(2)}
  <div class="ground"></div>`,
  text:`Göle gitmeden önce çiftlikte kocaman bir yarış başladı! Dada en önde koşarken birden yuvarlandı ve samanların içine düştü: <span class="speak">"Tosss!"</span> 😄 Hepsi kahkahalarla güldü. Barış ve Beyaz da sanki birer kuzu gibi zıplayıp eğleniyordu!`},

{ sky:"day", html:`
  <div class="sun" style="top:5%; left:8%"></div>
  ${clouds(3,20)}
  <div class="lake">
    <div class="ripple" style="left:20%;top:30%;width:12vmin;height:4vmin"></div>
    <div class="ripple" style="left:55%;top:45%;width:10vmin;height:3.4vmin;animation-delay:1.2s"></div>
  </div>
  ${actor("berrak","flip","left:20%; bottom:16%; width:12vmin; height:12vmin","hop")}
  ${actor("dada","","left:66%; bottom:16%; width:11.5vmin; height:11.5vmin","hop")}
  ${actor("baris","","left:4%; bottom:20%; width:18vmin; height:18vmin","bob")}
  ${actor("beyaz","flip","right:3%; bottom:20%; width:16vmin; height:16vmin","bob")}
  ${fish(44,16)}
  ${birds(2)}
  <div class="ground" style="height:14%"></div>`,
  text:`Öğleden sonra hep birlikte <b>saklı göle</b> gittiler! Berrak ve Dada suyun sığ kısmında zıplayıp Beyaz teyzeyi ve Barış abiyi ıslatmaya çalıştı. 💦 <i>(Göle dokun, su sıçrasın!)</i>`},

{ sky:"day", html:`
  <div class="sun" style="top:5%; right:6%"></div>
  <div class="cloudAnimal" data-say="Tavşan! 🐰" style="left:12%; top:12%; width:26vmin; height:22vmin" role="button" tabindex="0" aria-label="tavşan bulut">
    <svg viewBox="0 0 110 90"><use href="#cloudRabbit"/></svg></div>
  <div class="cloudAnimal" data-say="Koyun! 🐑" style="right:12%; top:26%; width:26vmin; height:20vmin" role="button" tabindex="0" aria-label="koyun bulut">
    <svg viewBox="0 0 100 85"><use href="#cloudSheep"/></svg></div>
  ${actor("berrak","","left:24%; bottom:19%; width:13vmin; height:13vmin","bob")}
  ${actor("dada","flip","left:56%; bottom:19%; width:12vmin; height:12vmin","bob")}
  <div class="butterfly" style="left:78%; top:48%">🦋</div>
  ${flowers(4)}
  <div class="ground"></div>`,
  text:`Su oyunundan yorulunca ağaçların gölgesine uzandılar ve bulutları hayvanlara benzettiler. Berrak: <span class="speak">"Şuna bakın! O bir tavşan!"</span> 🐰 Dada: <span class="speak">"O değil, o kesinlikle bir koyun!"</span> 🐑 <i>(Bulutlara dokun — sence hangisi?)</i>`},

{ sky:"sunset", html:`
  <div class="sun" style="bottom:24%; left:44%; background:radial-gradient(circle at 35% 35%,#FFC97A,#FF8E5A); box-shadow:0 0 50px 16px rgba(255,142,90,.5)"></div>
  ${clouds(3,20)}
  <div class="barn" style="right:5%"><div class="roof"></div><div class="body"></div><div class="win l"></div><div class="win r"></div><div class="door"></div></div>
  ${actor("baba","flip","right:28%; bottom:21%; width:21vmin; height:21vmin","bob")}
  ${actor("dada","","left:14%; bottom:20%; width:12vmin; height:12vmin","hop")}
  ${actor("berrak","","left:28%; bottom:20%; width:13vmin; height:13vmin","hop")}
  ${birds(2)}
  ${flowers(3)}
  <div class="ground"></div>`,
  text:`Akşam olunca gökyüzü turuncu ve pembeye büründü. Ahırın kapısında <b>babaları</b> onları bekliyordu! Kuzular koşarak yanına gitti. Baba sordu: <span class="speak">"Bakalım bugün kim en çok eğlendi?"</span> Dada kocaman zıpladı: <span class="speak">"Ben! Ama Berrak da çok eğlendi!"</span> 🧡`},

{ sky:"night", html:`
  ${stars(26)}
  <div class="moon" style="top:8%; right:10%"></div>
  ${actor("ay","","left:16%; bottom:20%; width:18vmin; height:18vmin","sleepy")}
  ${actor("berrak","flip","left:40%; bottom:19%; width:12vmin; height:12vmin","sleepy")}
  ${actor("dada","flip","left:54%; bottom:19%; width:11vmin; height:11vmin","sleepy")}
  ${actor("beyaz","flip","left:70%; bottom:20%; width:15vmin; height:15vmin","sleepy")}

  <div class="zzz" style="left:58%; bottom:36%; animation-delay:1.1s">z</div>
  <div class="zzz" style="left:50%; bottom:40%; animation-delay:2s">z</div>
  <div class="ground"></div>`,
  text:`Ay anne sordu: <span class="speak">"Bugün neler yaptınız bakalım?"</span> Berrak gülümsedi: <span class="speak">"Dada civcivlerle nazikçe oynamayı öğrendi!"</span> Beyaz teyze başını salladı: <span class="speak">"Aile olmak, birbirimizden öğrenmek demektir."</span> 💛`},

{ sky:"night", html:`
  ${stars(34)}
  <div class="moon" style="top:7%; left:10%"></div>
  <div class="theEnd">İyi geceler! 🌙 SON</div>
  ${actor("berrak","","left:34%; bottom:19%; width:12vmin; height:12vmin","sleepy")}
  ${actor("dada","flip","left:52%; bottom:19%; width:11vmin; height:11vmin","sleepy")}
  <div class="zzz" style="left:42%; bottom:36%">Z</div>
  <div class="zzz" style="left:56%; bottom:34%; animation-delay:1.4s">z</div>
  <div class="ground"></div>`,
  text:`O gece, çiftliğin en güvenli ve huzurlu köşesinde, sıcacık bir aile sevgisi içinde uykuya daldılar… 🌟 <b>Duru ve Derin, iyi geceler!</b>`,
  restart:true}
];

Storybook.init({pages});
</script>
</body>
</html>
